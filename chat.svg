<svg width="600" height="168" viewBox="0 0 600 168" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bubble { fill: #e9e9eb; }
    text {
      fill: #242424;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      letter-spacing: -0.01em;
    }
    .emoji { font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }

    .typing { opacity: 0; }
    .typing-1 { animation: blink-in 1.5s ease 0s 1; }
    .typing-2 { animation: blink-in 1.5s ease 2.5s 1; }
    .typing-3 { animation: blink-in 1.5s ease 5s 1; }

    .msg-1 { animation: wait 1.7s, pop-1 0.3s ease 1.7s; }
    .msg-2 { animation: wait 4.2s, pop-2 0.3s ease 4.2s; }
    .msg-3 { animation: wait 6.7s, pop-3 0.3s ease 6.7s; }

    .dot { fill: #8d8d93; }
    .d1 { animation: bounce 1.2s ease-in-out infinite 0s; }
    .d2 { animation: bounce 1.2s ease-in-out infinite 0.18s; }
    .d3 { animation: bounce 1.2s ease-in-out infinite 0.36s; }

    @keyframes wait { 0%, 100% { opacity: 0; } }
    @keyframes blink-in {
      0%, 100% { opacity: 0; }
      20%, 85%  { opacity: 1; }
    }
    @keyframes bounce {
      0%, 60%, 100% { opacity: 0.35; }
      30% { opacity: 1; }
    }
    @keyframes pop-1 { from { opacity: 0; transform: translate(10px, 6px);   } to { opacity: 1; transform: translate(10px, 0);   } }
    @keyframes pop-2 { from { opacity: 0; transform: translate(10px, 54px);  } to { opacity: 1; transform: translate(10px, 48px);  } }
    @keyframes pop-3 { from { opacity: 0; transform: translate(10px, 102px); } to { opacity: 1; transform: translate(10px, 96px);  } }
  </style>

  <!-- 1 -->
  <g class="typing typing-1" transform="translate(10, 0)">
    <rect width="64" height="40" rx="20" class="bubble" />
    <circle class="dot d1" cx="19" cy="20" r="5" />
    <circle class="dot d2" cx="32" cy="20" r="5" />
    <circle class="dot d3" cx="45" cy="20" r="5" />
  </g>
  <g class="msg-1" transform="translate(10, 0)">
    <rect width="205" height="40" rx="18" class="bubble" />
    <text x="18" y="25"><tspan class="emoji">👋</tspan>  Hi, I'm Preetham</text>
  </g>

  <!-- 2 -->
  <g class="typing typing-2" transform="translate(10, 48)">
    <rect width="64" height="40" rx="20" class="bubble" />
    <circle class="dot d1" cx="19" cy="20" r="5" />
    <circle class="dot d2" cx="32" cy="20" r="5" />
    <circle class="dot d3" cx="45" cy="20" r="5" />
  </g>
  <g class="msg-2" transform="translate(10, 48)">
    <rect width="312" height="40" rx="18" class="bubble" />
    <text x="18" y="25">SDE at AWS Payment Cryptography</text>
  </g>

  <!-- 3 -->
  <g class="typing typing-3" transform="translate(10, 96)">
    <rect width="64" height="40" rx="20" class="bubble" />
    <circle class="dot d1" cx="19" cy="20" r="5" />
    <circle class="dot d2" cx="32" cy="20" r="5" />
    <circle class="dot d3" cx="45" cy="20" r="5" />
  </g>
  <g class="msg-3" transform="translate(10, 96)">
    <rect width="380" height="62" rx="18" class="bubble" />
    <text x="18" y="26">I build cryptographic services that keep</text>
    <text x="18" y="48">online payments secure <tspan class="emoji">🔐</tspan></text>
  </g>
</svg>
